<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>فاتورة — الاستقدام الذكي</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap');
  :root{--teal:#0C4A45;--gold:#B5862A;--ink:#16211F;--sub:#5C6A66;--line:#E5E1D6;}
  *{box-sizing:border-box;font-family:'IBM Plex Sans Arabic',sans-serif;margin:0;padding:0;}
  body{background:#EEEBE3;color:var(--ink);padding:24px;}
  .sheet{max-width:780px;margin:0 auto;background:#fff;border:1px solid var(--line);border-radius:14px;padding:34px;}
  .top{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid var(--teal);padding-bottom:18px;margin-bottom:20px;}
  .co{display:flex;gap:12px;align-items:center;}
  .logo{width:50px;height:50px;border-radius:13px;background:var(--teal);display:flex;align-items:center;justify-content:center;}
  .co .nm{font-weight:700;font-size:18px;color:var(--teal);}
  .co .en{font-size:10px;letter-spacing:.2em;color:var(--gold);font-weight:600;}
  .ttl{text-align:left;}
  .ttl h1{font-size:22px;color:var(--teal);}
  .ttl .num{font-size:13px;color:var(--sub);margin-top:4px;}
  .parties{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px;}
  .box{border:1px solid var(--line);border-radius:10px;padding:14px;}
  .box h3{font-size:13px;color:var(--sub);margin-bottom:8px;}
  .box .row{font-size:13px;margin:3px 0;}
  .box .row b{color:var(--ink);}
  table{width:100%;border-collapse:collapse;margin:8px 0 16px;}
  th,td{border:1px solid var(--line);padding:10px;text-align:right;font-size:14px;}
  th{background:#F4F2EC;color:var(--teal);}
  .totals{margin-inline-start:auto;width:300px;}
  .totals .l{display:flex;justify-content:space-between;padding:6px 0;font-size:14px;}
  .totals .g{border-top:2px solid var(--teal);margin-top:6px;padding-top:10px;font-weight:800;font-size:17px;color:var(--teal);}
  .foot{margin-top:24px;color:var(--sub);font-size:12px;text-align:center;border-top:1px solid var(--line);padding-top:14px;}
  .actions{max-width:780px;margin:0 auto 14px;text-align:left;}
  button{cursor:pointer;border:none;border-radius:10px;font-weight:700;padding:10px 18px;font-size:14px;background:var(--teal);color:#fff;}
  .err{max-width:780px;margin:40px auto;text-align:center;color:#B23B3B;font-weight:600;}
  @media print{body{background:#fff;padding:0;}.actions{display:none;}.sheet{border:none;border-radius:0;}}
</style>
</head>
<body>
<div class="actions"><button onclick="window.print()">طباعة / حفظ PDF</button></div>
<div id="root"></div>
<script>
const API=location.origin;
const token=sessionStorage.getItem("rms_admin_token")||null;
const id=new URLSearchParams(location.search).get("id");
const gw='<svg viewBox="0 0 64 64" width="60%" height="60%" fill="none"><path d="M14 56 V30 a18 18 0 0 1 36 0 V56" stroke="#fff" stroke-width="6" stroke-linecap="round"/><path d="M32 4 L34.2 12.5 L42.5 14.7 L34.2 16.9 L32 25.4 L29.8 16.9 L21.5 14.7 L29.8 12.5 Z" fill="#D8B25A"/></svg>';
function row(label,val){return val?`<div class="row"><b>${label}:</b> ${val}</div>`:"";}
async function load(){
  if(!token){document.getElementById("root").innerHTML='<div class="err">يلزم تسجيل الدخول من لوحة مدير المنصة لعرض الفاتورة.</div>';return;}
  if(!id){document.getElementById("root").innerHTML='<div class="err">رقم الفاتورة مفقود.</div>';return;}
  let d;
  try{d=await fetch(API+"/api/admin/invoices/"+id,{headers:{Authorization:"Bearer "+token}}).then(r=>{if(!r.ok)throw 0;return r.json();});}
  catch(e){document.getElementById("root").innerHTML='<div class="err">تعذّر تحميل الفاتورة.</div>';return;}
  const i=d.invoice, c=d.company||{};
  document.getElementById("root").innerHTML=`
  <div class="sheet">
    <div class="top">
      <div class="co"><div class="logo">${gw}</div><div><div class="nm">${c.name||"الاستقدام الذكي"}</div><div class="en">SMART ISTIQDAM</div></div></div>
      <div class="ttl"><h1>فاتورة ضريبية</h1><div class="num">رقم: ${i.number}<br>التاريخ: ${i.issued_at}</div></div>
    </div>
    <div class="parties">
      <div class="box"><h3>المُصدِر (البائع)</h3>
        ${row("الاسم",c.name)}${row("السجل التجاري",c.cr)}${row("الرقم الضريبي",c.vatNo)}${row("البريد",c.email)}${row("الجوال",c.phone)}
      </div>
      <div class="box"><h3>العميل (المشتري)</h3>
        ${row("المكتب",i.buyer_name)}
      </div>
    </div>
    <table>
      <thead><tr><th>البند</th><th>السعر قبل الضريبة</th><th>ضريبة القيمة المضافة (15%)</th><th>الإجمالي</th></tr></thead>
      <tbody><tr><td>${i.description||("اشتراك "+i.plan_code)}</td><td>${i.amount.toFixed(2)} ر.س</td><td>${i.vat.toFixed(2)} ر.س</td><td>${i.total.toFixed(2)} ر.س</td></tr></tbody>
    </table>
    <div class="totals">
      <div class="l"><span>المجموع قبل الضريبة</span><span>${i.amount.toFixed(2)} ر.س</span></div>
      <div class="l"><span>ضريبة القيمة المضافة (15%)</span><span>${i.vat.toFixed(2)} ر.س</span></div>
      <div class="l g"><span>الإجمالي المستحق</span><span>${i.total.toFixed(2)} ر.س</span></div>
    </div>
    <div class="foot">شكراً لاشتراككم في منصة «الاستقدام الذكي». هذه فاتورة إلكترونية صادرة عبر النظام.</div>
  </div>`;
}
load();
</script>
</body>
</html>
